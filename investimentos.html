<!-- Exemplo de como ficam os cartões de investimento -->
<div class="grid-layout">
  <div class="card">
    <h2>📈 Ações</h2>
    <div class="form-group">
      <label>Total Investido (R$)</label>
      <input type="number" id="acoes-total" readonly style="background: #f8fafc; font-weight: bold;">
    </div>
    <div class="form-group">
      <label>Novo Aporte</label>
      <div class="input-with-button">
        <input type="number" id="valor-acoes" placeholder="0.00">
        <button class="btn" onclick="lancarMovimentacao('valor-acoes', 'acoes-total', 'hist-acoes', 'somar')">+</button>
      </div>
    </div>
    <div id="lista-acoes"></div>
    <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
    <textarea id="acoes-lista" class="auto-save" rows="3" placeholder="Notas sobre ativos..."></textarea>
  </div>
  
  <!-- Repetir a estrutura acima para FIIs e Cripto, mudando apenas os IDs -->
</div>
