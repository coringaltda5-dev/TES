<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão AI - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #27ae60; 
            --secondary: #2ecc71;
            --bike: #3498db; 
            --error: #e74c3c;
            --dark: #1a252f; 
            --bg: #0f171e; 
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex; 
            min-height: 100vh; 
            color: white; 
        }

        /* --- CONTEÚDO PRINCIPAL --- */
        .main-content { 
            flex: 1; 
            padding: 30px; 
            max-width: 1000px; 
            margin: auto; 
        }

        /* --- DASHBOARD HERO --- */
        .dashboard-hero { 
            background: linear-gradient(135deg, #1e2a38, #000000); 
            padding: 30px; 
            border-radius: 24px; 
            margin-bottom: 30px; 
            border: 1px solid var(--glass-border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .dashboard-hero::after { 
            content: ''; position: absolute; top: -50%; right: -10%; 
            width: 300px; height: 300px; background: var(--bike); 
            filter: blur(150px); opacity: 0.15; 
        }

        .dash-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            position: relative;
            z-index: 1;
        }

        .dash-item span { font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; font-weight: 600; }
        .dash-item b { display: block; font-size: 1.8rem; margin-top: 5px; }

        .full-width { 
            grid-column: span 2; 
            border-top: 1px solid var(--glass-border); 
            padding-top: 20px; 
            margin-top: 10px;
        }

        /* --- META PROGRESSO --- */
        .meta-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .progress-bar { background: rgba(255,255,255,0.1); height: 12px; border-radius: 10px; overflow: hidden; }
        .progress-fill { 
            background: linear-gradient(90deg, var(--primary), var(--secondary)); 
            height: 100%; width: 0%; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .edit-meta { 
            background: var(--glass); border: 1px solid var(--glass-border); 
            color: #bdc3c7; padding: 5px 12px; border-radius: 8px; 
            cursor: pointer; font-size: 0.7rem; transition: 0.3s;
        }
        .edit-meta:hover { background: white; color: var(--dark); }

        /* --- FORMULÁRIO --- */
        .form-box { 
            background: #161d24; 
            padding: 30px; 
            border-radius: 24px; 
            border: 1px solid var(--glass-border); 
            margin-bottom: 30px; 
        }
        
        label { display: block; margin-top: 15px; font-weight: 600; color: #94a3b8; font-size: 0.85rem; }
        select, input { 
            width: 100%; background: #0f171e; border: 1px solid #2d3748; 
            color: white; padding: 14px; margin: 8px 0; border-radius: 12px; 
            box-sizing: border-box; font-size: 1rem; transition: 0.3s;
        }
        select:focus, input:focus { border-color: var(--bike); outline: none; }

        .btn-add { 
            background: var(--primary); color: white; border: none; 
            width: 100%; padding: 18px; border-radius: 12px; 
            font-weight: 800; cursor: pointer; margin-top: 20px; 
            transition: 0.3s; font-size: 1rem;
        }
        .btn-add:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(39, 174, 96, 0.3); }

        /* --- LISTA DE ITENS --- */
        .item { 
            background: var(--glass); 
            padding: 20px; 
            border-radius: 18px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
            border-left: 6px solid #444; 
            border-top: 1px solid var(--glass-border);
            transition: 0.3s;
        }
        .item:hover { transform: scale(1.02); background: rgba(255,255,255,0.08); }
        .item.bike { border-left-color: var(--bike); }
        .item.casa { border-left-color: #9b59b6; }
        
        .item-info small { color: #94a3b8; font-size: 0.75rem; }
        .item-info strong { display: block; font-size: 1.1rem; }

        .btn-del { 
            background: rgba(231, 76, 60, 0.1); border: none; color: var(--error); 
            width: 40px; height: 40px; border-radius: 10px; 
            cursor: pointer; transition: 0.3s; 
        }
        .btn-del:hover { background: var(--error); color: white; }

        @media (max-width: 600px) {
            .dash-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <!-- Dashboard Estilo Glass -->
        <div class="dashboard-hero">
            <div class="dash-grid">
                <div class="dash-item">
                    <span>Dívida Restante Bike</span>
                    <b id="dividaBike" style="color: #ff7675;">R$ 1.013,00</b>
                </div>
                <div class="dash-item">
                    <span>Saldo Geral Livre</span>
                    <b id="saldoLivre" style="color: var(--secondary);">R$ 0,00</b>
                </div>
                <div class="full-width">
                    <div class="meta-header">
                        <span>Meta de Economia: <b id="valorMetaTxt" style="color: var(--primary);">R$ 0,00</b></span>
                        <button class="edit-meta" onclick="editarMeta()">EDITAR META</button>
                    </div>
                    <div class="progress-bar">
                        <div id="progressoMeta" class="progress-fill"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Formulário Moderno -->
        <div class="form-box">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label>Categoria</label>
                    <select id="categoria">
                        <option value="bike">🚲 Dívida Bike</option>
                        <option value="casa">🏠 Casa / Contas</option>
                    </select>
                </div>
                <div>
                    <label>Tipo</label>
                    <select id="tipo">
                        <option value="entrada">Entrada (+)</option>
                        <option value="saida">Saída (-)</option>
                    </select>
                </div>
            </div>

            <label>Data e Hora</label>
            <input type="datetime-local" id="dataLancamento">
            
            <label>Descrição e Valor</label>
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 15px;">
                <input type="text" id="desc" placeholder="Ex: Pagamento parcela">
                <input type="number" id="valor" step="0.01" placeholder="R$">
            </div>

            <button class="btn-add" onclick="salvar()">
                <i class="fas fa-check-circle"></i> REGISTRAR NO FLUXO
            </button>
        </div>

        <!-- Lista de Lançamentos -->
        <div class="lista" id="lista"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
