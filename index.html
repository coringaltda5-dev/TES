<!-- Dentro da div content do seu index.html -->
<div class="header-title">
  <h1>Controle Financeiro</h1>
  <span class="save-status" id="status-salvamento">Sincronizado</span>
</div>

<div class="grid-layout">
  <div class="card">
    <h2>Manutenção: Bicicleta</h2>
    <div class="form-group">
      <label>Custo Restante (R$)</label>
      <input type="number" id="saldo-bike" readonly style="background: #f8fafc; font-weight: bold; border: 2px solid #e2e8f0;">
    </div>
    <div class="form-group">
      <label>Lançar Ganho (Valor a diminuir)</label>
      <div class="input-with-button">
        <input type="number" id="valor-bike" placeholder="0.00">
        <button class="btn" onclick="lancarMovimentacao('valor-bike', 'saldo-bike', 'hist-bike', 'subtrair')">Lançar</button>
      </div>
    </div>
    <div id="lista-bike" style="margin-top: 10px;"></div>
  </div>

  <div class="card">
    <h2>Despesas Mensais</h2>
    <div class="form-group"><label>Aluguel</label><input type="number" id="aluguel" class="auto-save"></div>
    <div class="form-group"><label>Internet</label><input type="number" id="internet" class="auto-save"></div>
  </div>
</div>
